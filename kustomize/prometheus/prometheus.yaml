apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prometheus-server
  namespace: observability
spec:
  alerting:
    alertmanagers: []
  evaluationInterval: 30s
  podMonitorSelector: {}
  portName: web
  remoteWrite:
    - url: http://mimir-distributor.mimir.svc.cluster.local:8080/api/v1/push
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  retention: 2h
  ruleSelector: {}
  scrapeInterval: 30s
  serviceMonitorSelector: {}
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 4Gi
  walCompression: true